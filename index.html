<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin-Bet AI | Live Predictions</title>
    <style>
        :root { --neon: #00ff41; --dark: #0a0a0a; --card: #161616; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; }
        .logo { font-weight: 900; color: var(--neon); letter-spacing: 2px; font-size: 1.5rem; }
        .match-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; transition: 0.3s; }
        .match-card:hover { border-color: var(--neon); transform: translateY(-3px); }
        .league { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .teams { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .ai-badge { background: rgba(0, 255, 65, 0.1); color: var(--neon); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .analysis { margin-top: 15px; font-size: 0.9rem; color: #ccc; line-height: 1.5; border-top: 1px solid #333; padding-top: 10px; }
        .loading { font-style: italic; color: #666; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">MARTIN-BET AI</div>
        <div class="ai-badge">LIVE 2026 ENGINE</div>
    </div>
    <div id="app"><div class="loading">Analyzing Live Fixtures...</div></div>

    <script>
        const FB_KEY = "A8827ffa6c1aa49161d8cacb418d5ef75cfe99c865b2478ea68806ac95bc0384";
        const AI_KEY = "AIzaSyD-ItkNFg4n676lLv8qehfh3T2ts6WWnRs";

        async function askAI(home, away) {
            const prompt = `Expert betting analyst: Predict the winner for ${home} vs ${away}. 1 short sentence on WHY.`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch { return "Analysis complete. High probability of Home Win/Draw."; }
        }

        async function loadSite() {
            const display = document.getElementById('app');
            try {
                const res = await fetch('https://v3.football.api-sports.io/fixtures?date=2026-03-10&status=NS', {
                    headers: { 'x-apisports-key': FB_KEY }
                });
                const data = await res.json();
                display.innerHTML = "";
                if (data.response.length === 0) { display.innerHTML = "<p>No matches today.</p>"; return; }

                for (let match of data.response.slice(0, 10)) {
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <span class="league">${match.league.name}</span>
                        <div class="teams"><span>${match.teams.home.name}</span> <span>vs</span> <span>${match.teams.away.name}</span></div>
                        <div class="analysis"><span class="ai-badge">AI ANALYSIS</span> <span class="ai-text">Thinking...</span></div>
                    `;
                    display.appendChild(card);
                    askAI(match.teams.home.name, match.teams.away.name).then(text => {
                        card.querySelector('.ai-text').innerText = text;
                    });
                }
            } catch (e) { display.innerHTML = "Error loading live feed."; }
        }
        loadSite();
    </script>
</body>
</html>
